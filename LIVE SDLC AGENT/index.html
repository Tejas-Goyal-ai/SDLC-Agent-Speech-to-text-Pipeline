<!DOCTYPE html>
<html>
<head>
    <title>Google Meet Audio Capture</title>
</head>
<body>

    <h2>SDLC Agent - Audio Capture Test</h2>
    <button id="startBtn">Start Capture</button>

    <script>
        document.getElementById("startBtn").addEventListener("click", async () => {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: true,
                    audio: true
                });

                console.log("Stream Captured Successfully");
                console.log(stream);

                const audioTracks = stream.getAudioTracks();

                console.log("Audio Tracks:", audioTracks);

                if (audioTracks.length > 0) {
                    alert("Google Meet audio captured successfully!");
                } else {
                    alert("No audio track found.");
                }

            } catch (error) {
                console.error(error);
                alert("Capture failed");
            }
        });
    </script>

</body>
</html>
